<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<meta name="theme-color" content="#f3ecdf">
	<title>Upkeep</title>
	<link rel="manifest" href="./manifest.webmanifest?v=20260411pwa2">
	<link rel="icon" type="image/svg+xml" href="./icon.svg?v=20260411pwa2">
	<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png?v=20260411pwa2">
	<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png?v=20260411pwa2">
	<link rel="shortcut icon" href="./icon-192.png?v=20260411pwa2">
	<link rel="apple-touch-icon" href="./icon-192.png?v=20260411pwa2">
	<link rel="stylesheet" href="./index.css">
	<script type="module" src="./index.js"></script>
	<script defer src="../alpine.min.js"></script>
</head>
<body x-data="upkeepViewModel()" x-init="init()" x-on:keydown.escape.window="handleEscape()" :class="{ 'app-modal-open': isModalOpen }" x-cloak>
	<div class="app-shell">
		<header>
			<div class="header-row">
				<div class="header-side"></div>
				<div class="header-title">
					<h1>Upkeep</h1>
					<p x-text="todayHeaderLabel()"></p>
				</div>
				<div class="header-side right">
					<button class="icon-button" type="button" x-on:click="openSettings()" aria-label="Open settings">
						<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
							<path d="M12 2.8 L13.2 2.8 L13.7 5.1 A7 7 0 0 1 15.9 6 L17.9 4.8 L19.2 6.1 L18 8.1 A7 7 0 0 1 18.9 10.3 L21.2 10.8 L21.2 12.2 L18.9 12.7 A7 7 0 0 1 18 14.9 L19.2 16.9 L17.9 18.2 L15.9 17 A7 7 0 0 1 13.7 17.9 L13.2 20.2 L10.8 20.2 L10.3 17.9 A7 7 0 0 1 8.1 17 L6.1 18.2 L4.8 16.9 L6 14.9 A7 7 0 0 1 5.1 12.7 L2.8 12.2 L2.8 10.8 L5.1 10.3 A7 7 0 0 1 6 8.1 L4.8 6.1 L6.1 4.8 L8.1 6 A7 7 0 0 1 10.3 5.1 L10.8 2.8 Z"></path>
							<circle cx="12" cy="12" r="3.2"></circle>
						</svg>
					</button>
				</div>
			</div>
			<div class="mode-switch" role="tablist" aria-label="Choose app view">
				<template x-for="viewName in viewOptions" :key="viewName">
					<button class="mode-btn" type="button" :class="{ active: ui.view === viewName }" x-on:click="setView(viewName)" x-text="viewLabel(viewName)"></button>
				</template>
			</div>
		</header>

		<main class="app-scroll">

			<section class="empty-state" x-show="showActiveEmptyState">
				<template x-if="sortedTemplates.length === 0">
					<div>
						<div class="empty-eyebrow">Nothing active</div>
						<h2>Build your first upkeep routine.</h2>
						<p>Create a template for chores you repeat, then Upkeep will generate the next tasks automatically.</p>
						<button class="primary-button" type="button" x-on:click="openTemplateEditor()">Create template</button>
					</div>
				</template>
				<template x-if="sortedTemplates.length > 0">
					<div>
						<div class="empty-eyebrow">All caught up</div>
						<h2>No upkeep tasks are due right now.</h2>
						<p>Your templates are ready. New tasks will appear automatically based on their schedules.</p>
						<button class="primary-button" type="button" x-on:click="setView('templates')">View templates</button>
					</div>
				</template>
			</section>

			<section x-show="showActiveTasks">
				<template x-for="group in groupedActiveTasks" :key="group.key">
					<section class="task-group" :class="'group-' + group.key" x-show="group.items.length > 0">
						<div class="section-heading compact">
							<div>
								<h2 x-text="group.title"></h2>
							</div>
							<!-- <div class="section-count" x-text="group.items.length"></div> -->
						</div>
						<div class="task-list">
							<template x-for="instance in group.items" :key="instance.id">
								<article class="task-card compact" :class="taskCardClasses(instance)">
									<button class="task-toggle" type="button" x-on:click="toggleTaskOpen(instance.id)" :aria-expanded="isTaskOpen(instance.id) ? 'true' : 'false'">
										<div class="task-toggle-main">
											<div class="task-title-row compact">
												<h3 x-text="templateForInstance(instance).title"></h3>
											</div>
											<div class="task-due compact" x-text="formatTaskDateLabel(instance)"></div>
										</div>
										<span class="task-chevron" :class="{ open: isTaskOpen(instance.id) }" aria-hidden="true">⌄</span>
									</button>
									<div class="task-expand-shell" :class="{ open: isTaskOpen(instance.id) }" :style="expandShellStyle(isTaskOpen(instance.id), $refs.expandInner)" :aria-hidden="isTaskOpen(instance.id) ? 'false' : 'true'">
										<div class="task-expand" x-ref="expandInner">
											<div class="task-summary" x-text="templateRuleSummary(templateForInstance(instance))"></div>
											<ul class="checklist" x-show="hasChecklist(instance)">
												<template x-for="item in instance.items" :key="item.id">
													<li>
														<button class="check-item" type="button" :class="itemButtonClasses(instance, item)" x-on:click="toggleInstanceItem(instance.id, item.id)">
															<span class="checkbox" :class="itemCheckboxClasses(instance, item)"></span>
															<span class="check-label" x-text="item.label"></span>
														</button>
													</li>
												</template>
											</ul>
											<div class="task-expand-actions" x-show="!hasChecklist(instance)">
												<button class="primary-button compact full-width" type="button" x-on:click="toggleSingleActionInstance(instance.id)" x-text="isInstanceResolved(instance) ? 'Reactivate' : 'Mark complete'"></button>
											</div>
										</div>
									</div>
								</article>
							</template>
						</div>
					</section>
				</template>
			</section>

			<section x-show="showTemplatesView">
				<div class="section-heading templates-heading">
					<div>
						<div class="section-kicker">Templates</div>
						<h2>Recurring tasks</h2>
					</div>
					<button class="primary-button compact" type="button" x-on:click="openTemplateEditor()">New</button>
				</div>

				<section class="empty-state slim" x-show="sortedTemplates.length === 0">
					<div class="empty-eyebrow">No templates yet</div>
					<h2>Start with a weekly or monthly routine.</h2>
					<p>Add checklist steps, choose a recurrence pattern, and set how far ahead to generate tasks.</p>
				</section>

				<div class="template-list">
					<template x-for="template in sortedTemplates" :key="template.id">
						<article class="template-card">
							<div class="template-card-top">
								<div>
									<h3 x-text="template.title"></h3>
									<p x-text="templateRuleSummary(template)"></p>
								</div>
								<button class="icon-button small" type="button" x-on:click="openTemplateEditor(template.id)" aria-label="Edit template">
									<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
										<path d="M12 20h9"></path>
										<path d="M16.5 3.5a2.12 2.12 0 1 1 3 3L7 19l-4 1 1-4 12.5-12.5z"></path>
									</svg>
								</button>
							</div>
						</article>
					</template>
				</div>
			</section>
		</main>

		<div class="save-toast" :class="{ open: saveFeedback.open }" aria-live="polite" aria-atomic="true">
			<div class="save-toast-card">
				<div class="save-toast-copy">
					<div class="save-toast-kicker">Saved</div>
					<p x-text="saveFeedback.message"></p>
				</div>
			</div>
		</div>

		<div class="settings-overlay" :class="{ open: settingsOpen }" :aria-hidden="settingsOpen ? 'false' : 'true'">
			<div class="overlay-panel-inner">
			<div class="settings-header">
				<button class="sheet-action" type="button" x-on:click="closeSettings()">Close</button>
				<div class="settings-title">Settings</div>
				<div class="settings-header-spacer"></div>
			</div>
			<div class="settings-copy">
				Appearance and data tools for this device.
			</div>
			<div class="settings-list">
				<div class="settings-card">
					<div class="settings-action-main">
						<div class="settings-action-title">Theme</div>
						<div class="settings-action-subtitle">Select the preferred color theme.</div>
					</div>
					<div class="segmented compact" role="group" aria-label="Choose theme" :style="themeSegmentStyle()">
						<template x-for="theme in themeOptions" :key="'theme-' + theme">
							<button type="button" :class="{ active: model.themeMode === theme }" x-on:click="setTheme(theme)" x-text="themeLabel(theme)"></button>
						</template>
					</div>
				</div>

				<button class="settings-action-btn import" type="button" x-on:click="triggerImport()">
					<div class="settings-action-main">
						<div class="settings-action-title">Import data</div>
						<div class="settings-action-subtitle">Upload a backup and replace the current templates and active tasks on this device.</div>
					</div>
					<div class="settings-action-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path>
							<path d="M12 3v11"></path>
							<path d="M8 10l4 4 4-4"></path>
						</svg>
					</div>
				</button>

				<button class="settings-action-btn export" type="button" x-on:click="exportData()">
					<div class="settings-action-main">
						<div class="settings-action-title">Export data</div>
						<div class="settings-action-subtitle">Download a JSON backup of your templates, generated tasks, and settings.</div>
					</div>
					<div class="settings-action-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path>
							<path d="M12 15V4"></path>
							<path d="M8 8l4-4 4 4"></path>
						</svg>
					</div>
				</button>

				<button class="settings-action-btn wipe" type="button" x-on:click="confirmWipeData()">
					<div class="settings-action-main">
						<div class="settings-action-title">Wipe data</div>
						<div class="settings-action-subtitle">Clear all saved templates, generated tasks, and app settings after confirmation.</div>
					</div>
					<div class="settings-action-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M18 6 6 18M6 6l12 12"></path>
						</svg>
					</div>
				</button>
			</div>
			</div>
		</div>

		<div class="editor-overlay" :class="{ open: editor.open }" :aria-hidden="editor.open ? 'false' : 'true'">
			<template x-if="editor.open">
			<form class="editor-form overlay-panel-inner" x-on:submit.prevent="saveTemplate()">
				<div class="settings-header">
					<button class="sheet-action" type="button" x-on:click="closeTemplateEditor()">Cancel</button>
					<div class="sheet-title" x-text="editorTitle"></div>
					<div class="settings-header-spacer"></div>
				</div>
				<div class="editor-body guided-editor">
					<section class="construction-step hero" :class="constructionStepClasses('title')">
						<div class="construction-kicker">Step 1</div>
						<div class="construction-header-block">
							<h2>What do you need to do?</h2>
						</div>
						<input id="template-title" class="field-input feature-input" type="text" x-model="editor.template.title" x-ref="templateTitle" placeholder="Enter the task title">
					</section>

					<section class="construction-step" :class="constructionStepClasses('recurrence')">
						<div class="construction-kicker">Step 2</div>
						<div class="construction-header-block">
							<h2>How often?</h2>
						</div>

						<div class="cadence-launcher" x-show="editor.template.recurrence.length === 0 && !showRuleBuilder">
							<template x-for="option in recurrenceTypes" :key="'launch-' + option.value">
								<button class="cadence-launch-btn" type="button" x-on:click="beginNewRule(option.value)" x-text="option.label" :disabled="!editorTitleTrimmed"></button>
							</template>
						</div>

						<div class="rule-summary-list" x-show="editor.template.recurrence.length > 0">
							<template x-for="rule in editor.template.recurrence" :key="rule.id">
								<article class="rule-summary-card">
									<button class="rule-summary-main" type="button" x-on:click="editRule(rule.id)">
										<div class="rule-summary-title" x-text="describeRule(rule)"></div>
										<div class="rule-summary-meta" x-show="ruleCardMeta(rule)" x-text="ruleCardMeta(rule)"></div>
									</button>
									<button class="icon-button tiny danger" type="button" x-on:click="removeRule(rule.id)" aria-label="Remove rule">×</button>
								</article>
							</template>
						</div>

						<div class="rule-builder" x-show="showRuleBuilder">
							<div class="rule-builder-step">
								<div class="field-label">Choose the rhythm</div>
								<div class="choice-grid four-up">
									<template x-for="option in recurrenceTypes" :key="'builder-' + option.value">
										<button class="choice-chip" type="button" :class="{ active: editor.ruleEditor.draft.type === option.value }" x-on:click="setRuleDraftType(option.value)" x-text="option.label"></button>
									</template>
								</div>
							</div>

							<div class="rule-builder-step" x-show="editor.ruleEditor.draft.type === 'weekly'">
								<div class="field-label">On which day?</div>
								<div class="choice-grid">
									<template x-for="day in weekdayOptions" :key="'weekly-' + day.value">
										<button class="choice-chip" type="button" :class="{ active: editor.ruleEditor.draft.day === day.value }" x-on:click="editor.ruleEditor.draft.day = day.value" x-text="day.label"></button>
									</template>
								</div>
							</div>

							<div class="rule-builder-step" x-show="editor.ruleEditor.draft.type === 'monthly'">
								<div class="field-label">What kind of monthly pattern?</div>
								<div class="choice-grid two-up">
									<button class="choice-chip" type="button" :class="{ active: editor.ruleEditor.draft.mode !== 'weekday_position' }" x-on:click="setRuleDraftMonthlyMode('day_of_month')">Specific day</button>
									<button class="choice-chip" type="button" :class="{ active: editor.ruleEditor.draft.mode === 'weekday_position' }" x-on:click="setRuleDraftMonthlyMode('weekday_position')">Positional weekday</button>
								</div>
								<div class="field-grid two-up monthly-builder" x-show="editor.ruleEditor.draft.mode !== 'weekday_position'">
									<div class="field-block full-span">
										<label class="field-label">Day of month</label>
										<input class="field-input" type="number" min="1" max="31" x-model.number="editor.ruleEditor.draft.day">
									</div>
								</div>
								<div class="field-grid two-up monthly-builder" x-show="editor.ruleEditor.draft.mode === 'weekday_position'">
									<div class="field-block">
										<label class="field-label">Which one?</label>
										<select class="field-input" x-model.number="editor.ruleEditor.draft.ordinal">
											<template x-for="ordinal in ordinalOptions" :key="'ordinal-' + ordinal.value">
												<option :value="ordinal.value" x-text="ordinal.label"></option>
											</template>
										</select>
									</div>
									<div class="field-block">
										<label class="field-label">Weekday</label>
										<select class="field-input" x-model="editor.ruleEditor.draft.weekday">
											<template x-for="day in weekdayOptions" :key="'monthly-' + day.value">
												<option :value="day.value" x-text="day.label"></option>
											</template>
										</select>
									</div>
								</div>
							</div>

							<div class="rule-builder-step" x-show="editor.ruleEditor.draft.type === 'yearly'">
								<div class="field-label">When each year?</div>
								<div class="field-grid two-up">
									<div class="field-block">
										<label class="field-label">Month</label>
										<select class="field-input" x-model.number="editor.ruleEditor.draft.month">
											<template x-for="month in monthOptions" :key="'yearly-' + month.value">
												<option :value="month.value" x-text="month.label"></option>
											</template>
										</select>
									</div>
									<div class="field-block">
										<label class="field-label">Day</label>
										<input class="field-input" type="number" min="1" max="31" x-model.number="editor.ruleEditor.draft.day">
									</div>
								</div>
							</div>

							<div class="rule-builder-step advanced-shell">
								<div class="disclosure-heading" x-on:click="editor.ruleEditor.advancedOpen = !editor.ruleEditor.advancedOpen" :aria-expanded="editor.ruleEditor.advancedOpen ? 'true' : 'false'" role="button" tabindex="0" x-on:keydown.enter.prevent="editor.ruleEditor.advancedOpen = !editor.ruleEditor.advancedOpen" x-on:keydown.space.prevent="editor.ruleEditor.advancedOpen = !editor.ruleEditor.advancedOpen">
									<span class="field-label">Repeat details</span>
									<span class="disclosure-chevron" :class="{ open: editor.ruleEditor.advancedOpen }" aria-hidden="true">⌄</span>
								</div>
								<div class="advanced-panel" x-show="editor.ruleEditor.advancedOpen">
									<div class="field-block">
										<div class="interval-row advanced-interval-row">
											<span>Every</span>
											<input class="field-input interval-input" type="number" min="1" max="365" x-model.number="editor.ruleEditor.draft.interval">
											<span x-text="editor.ruleEditor.draft.type === 'daily' ? (editor.ruleEditor.draft.interval === 1 ? 'day' : 'days') : editor.ruleEditor.draft.type === 'weekly' ? (editor.ruleEditor.draft.interval === 1 ? 'week' : 'weeks') : editor.ruleEditor.draft.type === 'monthly' ? (editor.ruleEditor.draft.interval === 1 ? 'month' : 'months') : (editor.ruleEditor.draft.interval === 1 ? 'year' : 'years')"></span>
										</div>
									</div>
									<div class="field-block" :class="{ disabled: editor.ruleEditor.draft.interval <= 1 }">
										<label class="field-label">Start counting from</label>
										<input class="field-input" type="date" x-model="editor.ruleEditor.referenceDate" :disabled="editor.ruleEditor.draft.interval <= 1">
										<div class="field-hint" x-text="ruleEditorStartHint()"></div>
									</div>
								</div>
							</div>

							<div class="rule-builder-divider"></div>
							<div class="rule-preview-pill" x-text="ruleEditorPreview()"></div>

							<div class="builder-actions">
								<button class="secondary-button compact" type="button" x-on:click="closeRuleEditor()">Cancel</button>
								<button class="primary-button compact" type="button" x-on:click="saveRuleDraft()" x-text="editor.ruleEditor.mode === 'edit' ? 'Update rule' : 'Add rule'"></button>
							</div>
						</div>

						<div class="rule-actions-row" x-show="editor.template.recurrence.length > 0 && !showRuleBuilder">
							<button class="secondary-button compact" type="button" x-on:click="beginNewRule()">Add another rule</button>
						</div>
					</section>

					<section class="construction-step" :class="constructionStepClasses('checklist')">
						<div class="construction-kicker">Step 3</div>
						<div class="construction-header-block">
							<h2>Checklist items</h2>
						</div>
						<p class="inline-note">Optional list of items.</p>
						<div class="item-editor-list">
							<template x-for="(item, itemIndex) in editor.template.items" :key="item.id">
								<div class="item-editor-row guided-item-row checklist-editor-item" :class="checklistItemClasses(item)" x-on:dragenter.prevent="setChecklistDropTarget(item.id)" x-on:dragover.prevent="setChecklistDropTarget(item.id)" x-on:drop="handleChecklistDrop($event, item.id)">
									<button
										class="drag-handle"
										type="button"
										draggable="true"
										x-on:dragstart="startChecklistDrag($event, item.id)"
										x-on:dragend="finishChecklistDrag()"
										x-on:click.prevent
										aria-label="Reorder checklist item"
									>
										<svg viewBox="0 0 20 20" aria-hidden="true" fill="currentColor">
											<circle cx="6" cy="5" r="1.2"></circle>
											<circle cx="6" cy="10" r="1.2"></circle>
											<circle cx="6" cy="15" r="1.2"></circle>
											<circle cx="14" cy="5" r="1.2"></circle>
											<circle cx="14" cy="10" r="1.2"></circle>
											<circle cx="14" cy="15" r="1.2"></circle>
										</svg>
									</button>
									<input class="field-input" type="text" x-model="item.label" x-on:keydown.enter.prevent="confirmChecklistItem(item.id)" placeholder="Checklist item">
									<div class="item-editor-actions">
										<button class="icon-button tiny" type="button" x-show="item.isDraft" x-on:click="confirmChecklistItem(item.id)" :disabled="!String(item.label || '').trim()" aria-label="Confirm item">✓</button>
										<button class="icon-button tiny danger" type="button" x-show="!item.isDraft" x-on:click="removeChecklistItem(item.id)" aria-label="Remove item">×</button>
									</div>
								</div>
							</template>
						</div>
					</section>

					<section class="construction-step subtle" :class="constructionStepClasses('timing')">
						<div class="construction-kicker">Step 4</div>
						<div class="construction-header-block">
							<h2>When should this show up?</h2>
						</div>
						<div class="choice-grid two-up timing-mode-grid">
							<button class="choice-chip" type="button" :class="{ active: editor.windowMode === 'auto' }" x-on:click="setGenerationWindowMode('auto')">Automatic</button>
							<button class="choice-chip" type="button" :class="{ active: editor.windowMode === 'custom' }" x-on:click="setGenerationWindowMode('custom')">Custom</button>
						</div>
						<div class="rule-preview-pill timing-preview" x-text="generationWindowSummary()"></div>
						<div class="field-block" x-show="editor.windowMode === 'custom'">
							<label class="field-label" for="generation-window">Days ahead</label>
							<input id="generation-window" class="field-input" type="number" min="0" max="365" x-model.number="editor.template.generationWindowDays">
						</div>
					</section>

					<section class="construction-step final-step" :class="constructionStepClasses('submit')">
						<div class="construction-kicker">Step 5</div>
						<div class="construction-header-block">
							<h2>Save template</h2>
						</div>
						<button class="primary-button final-save-button" type="submit" x-text="editor.mode === 'edit' ? 'Save changes' : 'Create template'"></button>
					</section>

					<div class="danger-zone" x-show="editor.mode === 'edit'">
						<div>
							<div class="field-label">Delete template</div>
							<div class="field-hint">This removes the template and all generated instances tied to it.</div>
						</div>
						<button class="secondary-button danger" type="button" x-on:click="deleteTemplate(editor.template.id)">Delete</button>
					</div>
				</div>
			</form>
			</template>
		</div>

		<input
			type="file"
			accept=".json"
			x-ref="importFile"
			x-on:change="handleImport($event)"
			style="display:none"
		>
	</div>

	<script>
	if ('serviceWorker' in navigator) {
		window.addEventListener('load', () => {
			navigator.serviceWorker.register('./sw.js?v=20260411fix1').catch(error => {
				console.error('Service worker registration failed:', error);
			});
		});
	}
	</script>
</body>
</html>
