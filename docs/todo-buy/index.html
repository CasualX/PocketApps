<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<title>Todo: Buy</title>
	<link rel="manifest" href="./manifest.webmanifest?v=20260411pwa2">
	<link rel="icon" type="image/svg+xml" href="./icons/icon.svg?v=20260411pwa1">
	<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png?v=20260411pwa1">
	<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png?v=20260411pwa1">
	<link rel="shortcut icon" href="./icons/icon-192.png?v=20260411pwa1">
	<link rel="apple-touch-icon" href="./icons/icon-192.png?v=20260411pwa1">
	<link rel="stylesheet" href="./index.css">
	<script type="module" src="./index.js"></script>
	<script defer src="../alpine.min.js"></script>
</head>


<body x-data="todoBuyViewModel()" x-init="init()" x-on:keydown.escape.window="handleEscape()" x-on:pointermove.window="handleDragMove($event)" x-on:pointerup.window="finishItemDrag($event)" x-on:pointercancel.window="finishItemDrag($event)" x-cloak>
	<header>
		<div class="header-row">
			<div class="header-side"></div>
			<div class="header-title">
				<h1>Todo: Buy</h1>
			</div>
			<div class="header-side right">
				<button class="icon-button" type="button" x-on:click="openSettings()" aria-label="Open settings">
					<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
						<path d="M12 2.8 L13.2 2.8 L13.7 5.1 A7 7 0 0 1 15.9 6 L17.9 4.8 L19.2 6.1 L18 8.1 A7 7 0 0 1 18.9 10.3 L21.2 10.8 L21.2 12.2 L18.9 12.7 A7 7 0 0 1 18 14.9 L19.2 16.9 L17.9 18.2 L15.9 17 A7 7 0 0 1 13.7 17.9 L13.2 20.2 L10.8 20.2 L10.3 17.9 A7 7 0 0 1 8.1 17 L6.1 18.2 L4.8 16.9 L6 14.9 A7 7 0 0 1 5.1 12.7 L2.8 12.2 L2.8 10.8 L5.1 10.3 A7 7 0 0 1 6 8.1 L4.8 6.1 L6.1 4.8 L8.1 6 A7 7 0 0 1 10.3 5.1 L10.8 2.8 Z"></path>
						<circle cx="12" cy="12" r="3.2"></circle>
					</svg>
				</button>
			</div>
		</div>
		<div class="mode-switch">
			<button class="mode-btn" id="btn-mode-add" :class="{ active: state.mode === 'add' }" x-on:click="setMode('add')">Add Item</button>
			<button class="mode-btn" id="btn-mode-shop" :class="{ active: state.mode === 'shop' }" x-on:click="setMode('shop')">Shopping</button>
		</div>
	</header>

	<main id="app-content" x-ref="appContent">
		<!-- Add Mode -->
		<div id="view-add" x-show="isAddMode()">
			<div id="card-store" class="card selector-card" x-on:click="openOverlay('store')">
				<div class="label">Store</div>
				<div class="value" id="disp-store" :class="{ placeholder: !draft.store }" x-text="selectedStoreLabel()" ></div>
			</div>

			<div id="card-item" class="card selector-card" :class="{ disabled: !draft.store }" x-on:click="openOverlay('item')">
				<div class="label">Item</div>
				<div class="value" id="disp-item" :class="{ placeholder: !draft.item }" x-text="selectedItemLabel()" ></div>
			</div>

			<div id="card-quantity" class="card selector-card" :class="{ disabled: !draft.store || !draft.item }" x-on:click="openOverlay('quantity')">
				<div class="label">Quantity</div>
				<div class="value" id="disp-qty" :class="{ placeholder: !hasQuantity() }" x-text="quantityLabel()"></div>
			</div>

			<div id="card-notes" class="card selector-card" :class="{ disabled: !draft.store || !draft.item }" x-on:click="openOverlay('notes')">
				<div class="label">Notes</div>
				<div class="value" id="disp-notes" :class="{ placeholder: !hasNotes() }" x-text="notesLabel()" ></div>
			</div>
		</div>

		<!-- Shopping Mode: Stores -->
		<div id="view-shop-stores" x-show="isShoppingStoresView()">
			<template x-if="!hasShopStores()">
				<div style="text-align:center; padding: 40px; color: var(--text-secondary)">
					List is empty.<br>Go to "Add Item" to start.
				</div>
			</template>

			<template x-for="store in shopStores()" :key="store">
				<div class="store-row-card" x-on:click="openShopStore(store)">
					<div class="store-row-name" x-text="store"></div>
					<div class="store-row-meta" x-text="storeItemCountLabel(store)"></div>
				</div>
			</template>
		</div>

		<!-- Shopping Mode: Items -->
		<div id="view-shop-items" x-show="isShoppingItemsView()">
			<div class="store-header">
				<span class="back-btn" style="margin-right:15px; cursor:pointer;" x-on:click="goBackToStoreList()">❮</span>
				<span style="flex:1;" x-text="activeShopStoreLabel()"></span>
			</div>

			<div class="list-group shopping-items-list" x-ref="shopItemsList">
				<template x-for="entry in shopItemsForActiveStore()" :key="entryKey(entry)">
					<div class="list-item item-row" :data-entry-key="entryKey(entry)" :class="{ marked: entry.marked, 'drag-placeholder': isDraggingEntry(entry) }">
						<div class="item-left">
							<div class="item-name-line">
								<span class="item-name" x-text="entry.itemName"></span>
								<template x-if="entryHasQuantity(entry)">
									<span class="item-qty" x-text="entryQuantityLabel(entry)"></span>
								</template>
							</div>
							<template x-if="entryHasNotes(entry)">
								<div class="item-note-sub" x-text="entry.notes"></div>
							</template>
						</div>
						<div class="item-row-actions">
							<button class="item-drag-handle" type="button" aria-label="Drag to reorder" x-on:pointerdown="startItemDrag($event, entry)">≡</button>
							<button class="marked-btn" x-on:click="toggleMarked(entry.store, entry.itemName)" x-text="entryMarkedLabel(entry)"></button>
						</div>
					</div>
				</template>
			</div>

			<template x-if="dragState.active && dragState.previewEntry">
				<div class="list-item item-row drag-preview" :class="{ marked: dragState.previewEntry.marked }" :style="dragPreviewStyle()">
					<div class="item-left">
						<div class="item-name-line">
							<span class="item-name" x-text="dragState.previewEntry.itemName"></span>
							<template x-if="previewEntryHasQuantity()">
								<span class="item-qty" x-text="previewEntryQuantityLabel()"></span>
							</template>
						</div>
						<template x-if="previewEntryHasNotes()">
							<div class="item-note-sub" x-text="dragState.previewEntry.notes"></div>
						</template>
					</div>
					<div class="item-row-actions">
						<div class="item-drag-handle" aria-hidden="true">≡</div>
						<button class="marked-btn" type="button" tabindex="-1" x-text="previewEntryMarkedLabel()"></button>
					</div>
				</div>
			</template>
		</div>
	</main>

	<footer>
		<button
			id="main-action-btn"
			class="primary-btn"
			:disabled="mainActionDisabled()"
			:class="{ disabled: mainActionDisabled() }"
			:style="mainActionStyle()"
			x-on:click="handleMainAction()"
			x-text="mainActionLabel()"
		></button>
	</footer>

	<!-- Store Overlay -->
	<div id="overlay-store" class="overlay" :class="{ open: activeOverlay === 'store' }">
		<div class="overlay-header">
			<button class="close-overlay" x-on:click="closeOverlay()">Cancel</button>
			<div style="flex:1; text-align:center; font-weight:600">Select Store</div>
			<div style="width:50px"></div>
		</div>
		<div class="input-group">
			<input
				type="text"
				id="input-store"
				class="overlay-input"
				placeholder="Enter store name..."
				x-ref="inputStore"
				x-model="storeQuery"
				x-on:keydown.enter.prevent="selectStore(storeQuery)"
			>
		</div>
		<div class="list-group" id="list-stores">
			<template x-if="shouldShowStoreCreateOption()">
				<div
					class="list-item"
					x-on:click="selectStore(storeCreateLabel())"
				>
					<div>Use: <b x-text="storeCreateLabel()"></b></div>
				</div>
			</template>

			<template x-for="store in filteredStores()" :key="store">
				<div
					class="list-item"
					:class="{ selected: isStoreSelected(store) }"
					x-on:click="selectStore(store)"
					x-on:contextmenu.prevent="promptRenameStore(store)"
				>
					<span x-text="store"></span>
					<span class="delete-icon" :class="{ disabled: !canDeleteStore(store) }" x-on:click.stop="deleteStore(store)">✕</span>
				</div>
			</template>
		</div>
	</div>

	<!-- Item Overlay -->
	<div id="overlay-item" class="overlay" :class="{ open: activeOverlay === 'item' }">
		<div class="overlay-header">
			<button class="close-overlay" x-on:click="closeOverlay()">Cancel</button>
			<div style="flex:1; text-align:center; font-weight:600">Select Item</div>
			<div style="width:50px"></div>
		</div>
		<div class="input-group">
			<input
				type="text"
				id="input-item"
				class="overlay-input"
				placeholder="Enter item name..."
				x-ref="inputItem"
				x-model="itemQuery"
				x-on:keydown.enter.prevent="selectItem(itemQuery)"
			>
		</div>
		<div class="list-group" id="list-items">
			<template x-if="shouldShowItemCreateOption()">
				<div
					class="list-item"
					:class="{ present: isItemPresentForStore(draft.store, itemCreateLabel()) }"
					x-on:click="selectItem(itemCreateLabel())"
				>
					<div>Use: <b x-text="itemCreateLabel()"></b></div>
				</div>
			</template>

			<template x-for="item in filteredItems()" :key="item">
				<div
					class="list-item"
					:class="{ present: isItemPresentExact(draft.store, item), selected: isItemSelected(item) }"
					x-on:click="selectItem(item)"
					x-on:contextmenu.prevent="promptRenameItem(item)"
				>
					<span x-text="item"></span>
					<span class="delete-icon" :class="{ disabled: !canDeleteItem(item) }" x-on:click.stop="deleteItem(item)">✕</span>
				</div>
			</template>
		</div>
	</div>

	<!-- Quantity Overlay -->
	<div id="overlay-quantity" class="overlay" :class="{ open: activeOverlay === 'quantity' }">
		<div class="overlay-header">
			<button class="close-overlay" x-on:click="closeOverlay()">Cancel</button>
			<div style="flex:1; text-align:center; font-weight:600">Quantity</div>
			<button class="close-overlay" style="font-weight:600" x-on:click="confirmQuantity()">Done</button>
		</div>
		<div class="input-group" style="margin-top: 20px;">
			<input
				type="number"
				id="input-qty"
				class="overlay-input"
				style="text-align:center; font-size: 32px;"
				pattern="\d*"
				inputmode="numeric"
				x-ref="inputQty"
				x-model="qtyInput"
				x-on:keydown.enter.prevent="confirmQuantity()"
			>
		</div>
		<p style="text-align: center; color: var(--text-secondary); margin-top:0;">Leave empty for unspecified</p>
	</div>

	<!-- Notes Overlay -->
	<div id="overlay-notes" class="overlay" :class="{ open: activeOverlay === 'notes' }">
		<div class="overlay-header">
			<button class="close-overlay" x-on:click="closeOverlay()">Cancel</button>
			<div style="flex:1; text-align:center; font-weight:600">Notes</div>
			<button class="close-overlay" style="font-weight:600" x-on:click="confirmNotes()">Done</button>
		</div>
		<div class="input-group" style="margin-top: 20px; height: 200px;">
			<textarea
				id="input-notes"
				class="overlay-input"
				style="height:100%; resize:none;"
				placeholder="Example: Brand, Size, Aisle..."
				x-ref="inputNotes"
				x-model="notesInput"
			></textarea>
		</div>
	</div>

	<div
		class="settings-overlay"
		x-show="settingsOpen"
		x-transition:enter="settings-overlay-transition"
		x-transition:enter-start="settings-overlay-transition-start"
		x-transition:enter-end="settings-overlay-transition-end"
		x-transition:leave="settings-overlay-transition"
		x-transition:leave-start="settings-overlay-transition-end"
		x-transition:leave-end="settings-overlay-transition-start"
	>
		<div class="settings-header">
			<button class="sheet-action" type="button" x-on:click="closeSettings()">Close</button>
			<div class="settings-title">Settings</div>
			<div class="settings-header-spacer"></div>
		</div>
		<div class="settings-copy">
			Appearance and data tools for this device.
		</div>
		<div class="settings-list">
			<div class="settings-card">
				<div class="settings-action-main">
					<div class="settings-action-title">Theme</div>
					<div class="settings-action-subtitle">Select the preferred color theme.</div>
				</div>
				<div class="segmented compact" role="group" aria-label="Choose theme" :style="themeSegmentStyle()">
					<template x-for="theme in themeOptions" :key="'theme-' + theme">
						<button type="button" :class="{ active: model.themeMode === theme }" x-on:click="setTheme(theme)" x-text="theme"></button>
					</template>
				</div>
			</div>

			<button class="settings-action-btn import" type="button" x-on:click="triggerImport()">
				<div class="settings-action-main">
					<div class="settings-action-title">Import data</div>
					<div class="settings-action-subtitle">Upload a backup and replace the current stores, items, and shopping list on this device.</div>
				</div>
				<div class="settings-action-icon">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path>
						<path d="M12 3v11"></path>
						<path d="M8 10l4 4 4-4"></path>
					</svg>
				</div>
			</button>

			<button class="settings-action-btn export" type="button" x-on:click="exportData()">
				<div class="settings-action-main">
					<div class="settings-action-title">Export data</div>
					<div class="settings-action-subtitle">Download a JSON backup of your stores, items, and active shopping list.</div>
				</div>
				<div class="settings-action-icon">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"></path>
						<path d="M12 15V4"></path>
						<path d="M8 8l4-4 4 4"></path>
					</svg>
				</div>
			</button>

			<button class="settings-action-btn wipe" type="button" x-on:click="confirmWipeData()">
				<div class="settings-action-main">
					<div class="settings-action-title">Wipe data</div>
					<div class="settings-action-subtitle">Clear all saved history and shopping lists after confirmation.</div>
				</div>
				<div class="settings-action-icon">
					<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
						<path d="M18 6 6 18M6 6l12 12"></path>
					</svg>
				</div>
			</button>
		</div>
	</div>

	<input
		type="file"
		accept=".json"
		x-ref="importFile"
		x-on:change="handleImport($event)"
		style="display:none"
	>

	<script>
	if ('serviceWorker' in navigator) {
		window.addEventListener('load', () => {
			navigator.serviceWorker.register('./sw.js').catch(error => {
				console.error('Service worker registration failed:', error);
			});
		});
	}
	</script>
</body>
</html>
