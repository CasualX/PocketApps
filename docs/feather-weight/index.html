<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
	<title>Feather Weight</title>
	<link rel="manifest" href="./manifest.webmanifest?v=20260411pwa2">
	<link rel="icon" type="image/svg+xml" href="./icons/icon.svg?v=20260411pwa1">
	<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png?v=20260411pwa1">
	<link rel="icon" type="image/png" sizes="512x512" href="./icons/icon-512.png?v=20260411pwa1">
	<link rel="shortcut icon" href="./icons/icon-192.png?v=20260411pwa1">
	<link rel="apple-touch-icon" href="./icons/icon-192.png?v=20260411pwa1">
	<link rel="stylesheet" href="./index.css">
	<script type="module" src="./index.js"></script>
	<script defer src="../alpine.min.js"></script>
</head>
<body x-on:keydown.escape.window="handleEscape()">
	<div class="app-shell" x-data="featherWeightViewModel()" x-init="init()" x-cloak>
		<div class="app-scroll" x-show="!settingsOpen">
			<header>
				<div class="header-row">
					<div class="header-side"></div>
					<div class="header-title">
						<div class="header-title-button">
							<h1>Feather Weight</h1>
							<div class="header-date" x-text="formatHeaderDate()"></div>
						</div>
					</div>
					<div class="header-side right">
						<button class="icon-button" type="button" @click="openSettings()" aria-label="Open settings">
							<svg viewBox="0 0 24 24" aria-hidden="true" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
								<path d="M12 2.8 L13.2 2.8 L13.7 5.1 A7 7 0 0 1 15.9 6 L17.9 4.8 L19.2 6.1 L18 8.1 A7 7 0 0 1 18.9 10.3 L21.2 10.8 L21.2 12.2 L18.9 12.7 A7 7 0 0 1 18 14.9 L19.2 16.9 L17.9 18.2 L15.9 17 A7 7 0 0 1 13.7 17.9 L13.2 20.2 L10.8 20.2 L10.3 17.9 A7 7 0 0 1 8.1 17 L6.1 18.2 L4.8 16.9 L6 14.9 A7 7 0 0 1 5.1 12.7 L2.8 12.2 L2.8 10.8 L5.1 10.3 A7 7 0 0 1 6 8.1 L4.8 6.1 L6.1 4.8 L8.1 6 A7 7 0 0 1 10.3 5.1 L10.8 2.8 Z"/>
								<circle cx="12" cy="12" r="3.2"/>
							</svg>
						</button>
					</div>
				</div>
			</header>

			<template x-if="sortedEntries.length === 0">
				<section class="section empty-intro">
					<div class="empty-intro-copy">
						<div class="empty-intro-title">Instructions</div>
						<div class="empty-intro-text">Weigh yourself under the same conditions each morning, ideally before breakfast and after using the bathroom, for the best accuracy.</div>
					</div>
					<div class="empty-intro-actions">
						<div class="empty-intro-step">
							<div class="empty-intro-hint">Choose Unit</div>
							<div class="segmented empty-unit-picker" role="group" aria-label="Choose unit" :style="{ '--segment-count': unitOptions.length, '--segment-active': Math.max(unitOptions.indexOf(model.unit), 0) }">
								<template x-for="unit in unitOptions" :key="`empty-unit-${unit}`">
									<button type="button" :class="{ active: model.unit === unit }" @click="switchUnit(unit)" x-text="unit"></button>
								</template>
							</div>
						</div>
						<div class="empty-intro-step">
							<div class="empty-intro-hint">Set Starting Weight</div>
							<button class="empty-entry-button" type="button" @click="openNewEntry()" aria-label="Add first weight entry">
								<span class="empty-entry-button-plus">＋</span>
								<span class="empty-entry-button-title">Open Weight Picker</span>
							</button>
						</div>
					</div>
				</section>
			</template>

			<template x-if="sortedEntries.length > 0">
				<section class="section top-summary">
					<div class="current-stat">
						<div class="current-stat-grid">
							<button class="current-stat-panel" type="button" @click="openNewEntry()" aria-label="Update current weight">
								<span class="stat-label">Current Weight</span>
								<span class="current-stat-copy">
									<span class="current-stat-value-row">
										<span class="current-stat-value" x-text="currentWeightLabel"></span>
										<span class="current-stat-unit" x-text="model.unit"></span>
									</span>
									<span class="current-stat-meta" x-text="currentPanelDateLabel"></span>
								</span>
							</button>
							<button class="current-stat-panel" type="button" @click="openGoalSetup()" aria-label="Set goal weight">
								<span class="stat-label">Goal Weight</span>
								<span class="current-stat-copy">
									<span class="current-stat-value-row">
										<span class="current-stat-value" :class="{ placeholder: !model.goal }" x-text="goalWeightLabel"></span>
										<template x-if="model.goal">
											<span class="current-stat-unit" x-text="model.unit"></span>
										</template>
									</span>
									<span class="current-stat-meta" x-text="goalPanelMeta"></span>
								</span>
							</button>
						</div>
					</div>
					<div class="stats-row">
						<div class="stat-block">
							<div class="stat-label" x-text="lastWeekDeltaCard.label"></div>
							<div class="stat-value tone-value" :class="lastWeekDeltaCard.tone">
								<span class="stat-number" x-text="lastWeekDeltaCard.valueNumber"></span>
								<template x-if="lastWeekDeltaCard.valueUnit">
									<span class="stat-unit" x-text="lastWeekDeltaCard.valueUnit"></span>
								</template>
							</div>
						</div>
						<div class="stat-block">
							<div class="stat-label" x-text="lastMonthDeltaCard.label"></div>
							<div class="stat-value tone-value" :class="lastMonthDeltaCard.tone">
								<span class="stat-number" x-text="lastMonthDeltaCard.valueNumber"></span>
								<template x-if="lastMonthDeltaCard.valueUnit">
									<span class="stat-unit" x-text="lastMonthDeltaCard.valueUnit"></span>
								</template>
							</div>
						</div>
					</div>
				</section>
			</template>

			<template  x-if="sortedEntries.length > 0">
				<section class="section chart-card">

					<div class="chart-shell">
						<div class="chart-title-row section-title-row">
							<div class="chart-title-label section-title-label">Trend</div>
							<template x-if="sortedEntries.length > 0">
								<div class="segmented chart-controls section-controls" aria-label="Choose chart zoom" :style="{ '--segment-count': zoomOptions.length, '--segment-active': Math.max(zoomOptions.indexOf(model.zoom), 0) }">
									<template x-for="zoom in zoomOptions" :key="`zoom-${zoom}`">
										<button type="button" :class="{ active: model.zoom === zoom }" @click="setZoom(zoom)" x-text="zoom"></button>
									</template>
								</div>
							</template>
						</div>

						<template x-if="sortedEntries.length === 0">
							<div class="chart-empty">
								<strong>No weight data yet</strong>
								Add your first measurement to start the graph.
							</div>
						</template>

						<template x-if="sortedEntries.length > 0">
							<div class="chart-layout">
								<div class="chart-axis-rail" aria-hidden="true">
									<svg :width="chartRender.model.axisWidth" :height="chartRender.model.height" :viewBox="`0 0 ${chartRender.model.axisWidth} ${chartRender.model.height}`">
										<g x-html="chartRender.yAxisMarkup"></g>
									</svg>
								</div>
								<div class="chart-scroll-wrap" :class="{ 'fade-left': chartFadeLeft, 'fade-right': chartFadeRight }">
									<div class="chart-scroll" x-ref="chartScroll" @scroll.passive="onChartScroll()">
									<svg :width="chartRender.model.width" :height="chartRender.model.height" :viewBox="`0 0 ${chartRender.model.width} ${chartRender.model.height}`" aria-label="Weight chart" role="img">
										<g>
												<g x-html="chartRender.horizontalMinorGridMarkup"></g>
												<g x-html="chartRender.horizontalMajorGridMarkup"></g>
												<g x-html="chartRender.verticalMinorGridMarkup"></g>
												<g x-html="chartRender.verticalMajorGridMarkup"></g>
											<line x1="0" :y1="chartRender.model.plotBottom" :x2="chartRender.model.width" :y2="chartRender.model.plotBottom" stroke="var(--border)" stroke-width="1"></line>
											<path :d="chartRender.model.path" fill="none" stroke="var(--line)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"></path>
											<g x-html="chartRender.valueLabelsMarkup"></g>
											<g x-html="chartRender.pointsMarkup"></g>
											<g x-html="chartRender.xLabelsMarkup"></g>
										</g>
									</svg>
									</div>
								</div>
							</div>
						</template>
					</div>
				</section>
			</template>

			<template x-if="sortedEntries.length > 0">
				<section class="section history-section">
					<div class="history-title-row section-title-row">
						<div class="history-section-kicker section-title-label">History</div>
						<div class="segmented compact history-controls section-controls" role="group" aria-label="Choose history view" :style="{ '--segment-count': historyViewOptions.length, '--segment-active': Math.max(historyViewOptions.indexOf(activeHistoryView), 0) }">
							<template x-for="historyView in historyViewOptions" :key="`history-view-${historyView}`">
								<button type="button" :class="{ active: activeHistoryView === historyView }" @click="setHistoryView(historyView)" x-text="historyView"></button>
							</template>
						</div>
					</div>

					<ul class="history-week-list">
						<template x-for="period in visibleHistory" :key="period.periodStart">
							<li class="history-week-card" :class="{ expanded: expandedHistory[period.periodStart] }">
								<div class="history-week-row">
									<div class="history-week-main">
										<div class="history-week-date" x-text="period.periodLabel"></div>
										<div class="history-week-delta">
											<template x-if="period.delta">
												<div class="history-week-delta-value tone-value" :class="period.delta.tone">
													<span x-text="period.delta.number"></span>
													<span class="history-week-delta-unit" x-text="period.delta.unit"></span>
												</div>
											</template>
											<template x-if="!period.delta">
												<div class="history-week-delta-value tone-value missing">--</div>
											</template>
										</div>
										<div class="history-week-value-group">
											<span class="history-week-value" x-text="period.medianValue"></span>
											<span class="history-week-unit" x-text="model.unit"></span>
										</div>
									</div>
									<button
										class="history-week-toggle"
										type="button"
										@click="toggleHistoryExpansion(period.periodStart)"
										:aria-expanded="String(expandedHistory[period.periodStart])"
										:aria-label="historyToggleAriaLabel(period)"
									>⌄</button>
								</div>

								<div class="history-week-detail" :aria-hidden="String(!expandedHistory[period.periodStart])">
									<div class="history-week-detail-inner">
										<ul class="history-list">
											<template x-for="entry in period.entries" :key="entry.date">
												<li class="history-item"
													:class="{ removing: !!removingIds[entry.date] }"
													@contextmenu.prevent="openEdit(entry)">
													<div class="history-date">
														<div class="history-day" x-text="formatHistoryItemLabel(entry, period)"></div>
													</div>
													<div class="history-spacer" aria-hidden="true"></div>
													<div class="history-value">
														<span x-text="formatWeight(entry.weightKg)"></span>
														<span class="history-value-unit" x-text="model.unit"></span>
													</div>
													<button class="history-delete" type="button" aria-label="Delete entry" @click.stop="deleteEntry(entry.date)">🗑</button>
												</li>
											</template>
										</ul>
									</div>
								</div>
							</li>
						</template>
					</ul>

					<template x-if="hasMoreHistory">
						<div class="history-load-more-row">
							<button class="history-load-more" type="button" @click="loadFullHistory()">Load All History</button>
						</div>
					</template>
				</section>
			</template>
		</div>

		<div class="settings-overlay" x-show="settingsOpen">
			<div class="history-overlay-header">
				<button class="sheet-action" type="button" @click="closeSettings()">Close</button>
				<div class="history-overlay-title">Settings</div>
				<div class="history-overlay-spacer"></div>
			</div>
			<div class="settings-copy">
				Appearance and data tools for this device.
			</div>
			<div class="settings-list">
				<div class="settings-card">
					<div class="settings-action-main">
						<div class="settings-action-title">Theme</div>
						<div class="settings-action-subtitle">Select the preferred color theme.</div>
					</div>
					<div class="segmented compact" role="group" aria-label="Choose theme" :style="{ '--segment-count': themeOptions.length, '--segment-active': Math.max(themeOptions.indexOf(model.themeMode), 0) }">
						<template x-for="theme in themeOptions" :key="`theme-${theme}`">
							<button type="button" :class="{ active: model.themeMode === theme }" @click="setTheme(theme)" x-text="theme"></button>
						</template>
					</div>
				</div>

				<button class="settings-action-btn import" type="button" @click="triggerImport()">
					<div class="settings-action-main">
						<div class="settings-action-title">Import data</div>
						<div class="settings-action-subtitle">Upload a backup and replace the current measurements, settings, and history on this device.</div>
					</div>
					<div class="settings-action-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/>
							<path d="M12 3v11"/>
							<path d="M8 10l4 4 4-4"/>
						</svg>
					</div>
				</button>

				<button class="settings-action-btn export" type="button" @click="exportData()">
					<div class="settings-action-main">
						<div class="settings-action-title">Export data</div>
						<div class="settings-action-subtitle">Download a JSON backup of the current measurements and preferences.</div>
					</div>
					<div class="settings-action-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M4 14v4a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-4"/>
							<path d="M12 15V4"/>
							<path d="M8 8l4-4 4 4"/>
						</svg>
					</div>
				</button>

				<button class="settings-action-btn wipe" type="button" @click="confirmWipeData()">
					<div class="settings-action-main">
						<div class="settings-action-title">Wipe data</div>
						<div class="settings-action-subtitle">Clear all saved measurements and leave the app empty after confirmation.</div>
					</div>
					<div class="settings-action-icon">
						<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
							<path d="M18 6 6 18M6 6l12 12"/>
						</svg>
					</div>
				</button>
			</div>
		</div>

		<input
			type="file"
			accept=".json"
			x-ref="importFile"
			@change="handleImport($event)"
			style="display:none"
		>

		<div class="sheet-scrim" :class="{ open: overlayOpen }" @click="closeOverlay()"></div>
		<div class="sheet" :class="{ open: overlayOpen }" @keydown.escape.window="closeOverlay()">
			<div class="sheet-panel">
				<div class="sheet-handle"></div>
				<div class="sheet-header">
					<button class="micro-button sheet-action-button" type="button" @click="closeOverlay()">Cancel</button>
					<div class="sheet-title" x-text="overlayTitle"></div>
					<button class="micro-button sheet-action-button primary" type="button" @click="saveOverlay()" x-text="overlaySaveButtonLabel"></button>
				</div>

				<div class="picker">
					<div class="picker-highlight"></div>
					<div class="picker-wheel" x-ref="wholeWheel" @scroll.passive="onWheelScroll('whole', $el)" @wheel="onPickerWheel('whole', $event, $el)">
						<div class="picker-spacer"></div>
						<template x-for="value in activeWholeList" :key="`whole-${model.unit}-${value}`">
							<div class="picker-item" :class="{ active: pickerWhole === value }" x-text="value"></div>
						</template>
						<div class="picker-spacer"></div>
					</div>
					<div class="picker-dot">.</div>
					<div class="picker-wheel decimal" x-ref="decimalWheel" @scroll.passive="onWheelScroll('decimal', $el)" @wheel="onPickerWheel('decimal', $event, $el)">
						<div class="picker-spacer"></div>
						<template x-for="value in decimals" :key="`decimal-${value}`">
							<div class="picker-item" :class="{ active: pickerDecimal === value }" x-text="value"></div>
						</template>
						<div class="picker-spacer"></div>
					</div>
					<div class="picker-unit" x-text="model.unit"></div>
				</div>

				<div class="sheet-meta">
					<div class="sheet-field">
						<div class="sheet-field-label">Choose Unit</div>
						<div class="segmented sheet-unit-picker" role="group" aria-label="Choose unit" :style="{ '--segment-count': unitOptions.length, '--segment-active': Math.max(unitOptions.indexOf(model.unit), 0) }">
							<template x-for="unit in unitOptions" :key="`sheet-unit-${unit}`">
								<button type="button" :class="{ active: model.unit === unit }" @click="switchUnit(unit)" x-text="unit"></button>
							</template>
						</div>
					</div>
					<template x-if="overlayMode === 'entry'">
						<div class="sheet-field">
							<label class="sheet-field-label" for="entry-date">Choose Date</label>
							<input id="entry-date" class="sheet-date-input" type="date" x-model="entryDate">
						</div>
					</template>
					<template x-if="overlayMode === 'goal'">
						<div class="sheet-field full">
							<div class="sheet-field-label">Goal Pace</div>
							<div class="goal-rate-panel">
								<div class="segmented goal-rate-period-picker" role="group" aria-label="Choose goal pace unit" :style="{ '--segment-count': goalRateUnitOptions.length, '--segment-active': Math.max(goalRateUnitOptions.indexOf(goalRateDraftUnit), 0) }">
									<template x-for="rateUnit in goalRateUnitOptions" :key="`goal-rate-draft-${rateUnit}`">
										<button type="button" :class="{ active: goalRateDraftUnit === rateUnit }" @click="setGoalRateDraftUnit(rateUnit)" x-text="rateUnit"></button>
									</template>
								</div>
								<div class="goal-rate-stepper">
									<button class="goal-rate-button" type="button" @click="changeGoalRate(-1)" :aria-label="goalRateStepAriaLabel(-1)">−</button>
									<div class="goal-rate-value">
										<div class="goal-rate-number" x-text="goalRateDraftLabel"></div>
										<div class="goal-rate-unit" x-text="goalRateUnitLabel"></div>
									</div>
									<button class="goal-rate-button" type="button" @click="changeGoalRate(1)" :aria-label="goalRateStepAriaLabel(1)">+</button>
								</div>
							</div>
						</div>
					</template>
					<template x-if="overlayMode === 'goal'">
						<div class="sheet-field full">
							<div class="goal-preview">
								<div class="goal-preview-kicker">Projection</div>
								<div class="goal-preview-title" x-text="goalPreview.title"></div>
								<div class="goal-preview-detail" x-text="goalPreview.detail"></div>
							</div>
						</div>
					</template>
					<template x-if="overlayMode === 'goal' && model.goal">
						<div class="sheet-field full">
							<button class="sheet-clear-button" type="button" @click="clearGoal()">Clear Goal</button>
						</div>
					</template>
				</div>
			</div>
		</div>
	</div>
	<script>
	if ('serviceWorker' in navigator) {
		window.addEventListener('load', () => {
			navigator.serviceWorker.register('./sw.js').catch(error => {
				console.error('Service worker registration failed:', error);
			});
		});
	}
	</script>
</body>
</html>
